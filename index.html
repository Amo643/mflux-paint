<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>mflux paint</title>
<style>
  :root { --bg:#0e0f12; --panel:#1a1c22; --line:#2a2d36; --txt:#e8e8ea; --accent:#4f8cff; }
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
              font:14px/1.4 -apple-system,system-ui,sans-serif; overflow:hidden; }
  #stage { position:absolute; inset:0 0 92px 0; display:flex; align-items:center;
           justify-content:center; }
  #drop { position:absolute; inset:24px; border:2px dashed var(--line); border-radius:16px;
          display:flex; align-items:center; justify-content:center; flex-direction:column;
          gap:10px; color:#888; text-align:center; cursor:pointer; }
  #drop.hide { display:none; }
  #drop b { color:var(--txt); font-size:16px; }
  #drop.drag { border-color:var(--accent); color:var(--accent); }
  #wrap { position:relative; max-width:100%; max-height:100%; box-shadow:0 8px 40px #000a;
          transform-origin:0 0; will-change:transform; }
  #draw.hidemask { opacity:0; }
  #wrap.hide { display:none; }
  canvas { display:block; max-width:100%;
           max-height:calc(100vh - 92px - 32px); touch-action:none; }
  #view { border-radius:8px; }
  #draw { position:absolute; left:0; top:0; cursor:crosshair; }
  /* bottom bar */
  #bar { position:absolute; left:0; right:0; bottom:0; height:92px; background:var(--panel);
         border-top:1px solid var(--line); display:flex; align-items:center; gap:12px;
         padding:0 16px; }
  #prompt { flex:1; height:48px; background:#0e0f12; border:1px solid var(--line);
            border-radius:10px; color:var(--txt); padding:0 14px; font-size:15px; }
  #prompt:focus { outline:none; border-color:var(--accent); }
  button { height:48px; padding:0 18px; border:1px solid var(--line); background:#23262e;
           color:var(--txt); border-radius:10px; font-size:14px; cursor:pointer; }
  button:hover { border-color:#3a3e49; }
  #run { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;
         min-width:110px; }
  button:disabled { opacity:.5; cursor:default; }
  .tool { display:flex; align-items:center; gap:6px; color:#9aa; font-size:12px; }
  #brush { width:90px; }
  /* top-right floating actions */
  #top { position:absolute; top:14px; left:14px; display:flex; gap:8px; z-index:5; }
  #top.hide { display:none; }
  #top button { height:38px; padding:0 12px; background:#1a1c22cc; backdrop-filter:blur(6px); }
  /* spinner */
  #busy { position:absolute; inset:0 0 92px 0; display:none; align-items:center;
          justify-content:center; flex-direction:column; gap:14px; background:#0008; z-index:10; }
  #busy.on { display:flex; }
  .sp { width:40px; height:40px; border:4px solid #444; border-top-color:var(--accent);
        border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #err { position:absolute; bottom:104px; left:16px; right:16px; background:#3a1c1c;
         border:1px solid #6b2b2b; color:#ffb4b4; padding:10px 14px; border-radius:10px;
         display:none; font-size:13px; white-space:pre-wrap; max-height:160px; overflow:auto; }
  #cursor { position:fixed; border:2px solid #fff; border-radius:50%; pointer-events:none;
            transform:translate(-50%,-50%); mix-blend-mode:difference; display:none; z-index:6;
            box-shadow:0 0 0 1px #0008 inset; }
</style>
</head>
<body>
  <div id="top" class="hide">
    <button id="newImg">New image</button>
    <button id="clearMask">Clear mask</button>
    <button id="resetZoom">Reset zoom</button>
    <button id="download">Save</button>
  </div>
  <div id="cursor"></div>

  <div id="stage">
    <div id="drop">
      <b>Drop an image here</b>
      <span>drag &amp; drop · paste (⌘V) · click to choose</span>
    </div>
    <div id="wrap" class="hide">
      <canvas id="view"></canvas>
      <canvas id="draw"></canvas>
    </div>
  </div>

  <div id="busy"><div class="sp"></div><span id="busyTxt">Working…</span></div>
  <div id="err"></div>

  <div id="bar">
    <input id="prompt" placeholder="Describe the edit… (e.g. remove it / add a cat)">
    <label class="tool">Brush <input id="brush" type="range" min="6" max="120" value="40"></label>
    <button id="run" disabled>Run</button>
  </div>

  <input id="file" type="file" accept="image/*" hidden>

<script>
const $ = s => document.querySelector(s);
const view = $('#view'), draw = $('#draw');
const vctx = view.getContext('2d'), dctx = draw.getContext('2d');
let mask, mctx;                 // offscreen white-on-black mask at image resolution
let hasImage = false, hasMask = false, busy = false;

function showErr(m){ const e=$('#err'); e.textContent='Error: '+m; e.style.display='block';
  setTimeout(()=>e.style.display='none', 8000); }
function setBusy(b, t){ busy=b; $('#busy').classList.toggle('on',b);
  if(t)$('#busyTxt').textContent=t; $('#run').disabled = b || !hasImage; }

function loadImage(src){
  const im = new Image();
  im.onload = ()=>{
    view.width=draw.width=im.naturalWidth; view.height=draw.height=im.naturalHeight;
    vctx.drawImage(im,0,0);
    mask=document.createElement('canvas'); mask.width=im.naturalWidth; mask.height=im.naturalHeight;
    mctx=mask.getContext('2d'); mctx.fillStyle='#000'; mctx.fillRect(0,0,mask.width,mask.height);
    dctx.clearRect(0,0,draw.width,draw.height);
    hasImage=true; hasMask=false; resetT();
    $('#drop').classList.add('hide'); $('#wrap').classList.remove('hide'); $('#top').classList.remove('hide');
    $('#run').disabled=false;
  };
  im.onerror=()=>showErr('could not load image');
  im.src=src;
}
function fileToImg(f){ if(!f||!f.type.startsWith('image/'))return;
  const r=new FileReader(); r.onload=e=>loadImage(e.target.result); r.readAsDataURL(f); }

// ---- load: click / file / drag&drop / paste ----
$('#drop').onclick=()=>$('#file').click();
$('#file').onchange=e=>fileToImg(e.target.files[0]);
$('#newImg').onclick=()=>$('#file').click();
window.addEventListener('paste', e=>{ for(const it of e.clipboardData.files) return fileToImg(it); });
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();$('#drop').classList.add('drag');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();$('#drop').classList.remove('drag');}));
document.addEventListener('drop', e=>{ if(e.dataTransfer.files[0]) fileToImg(e.dataTransfer.files[0]); });

// ---- brush ----
let drawing=false, last=null;
function pos(e){ const r=draw.getBoundingClientRect();
  const x=(e.clientX-r.left)*(draw.width/r.width), y=(e.clientY-r.top)*(draw.height/r.height);
  return {x,y}; }
function brushW(){ return +$('#brush').value * (draw.width/draw.getBoundingClientRect().width); }
function stroke(a,b){
  const w=brushW();
  for(const [c,col] of [[dctx,'rgba(255,70,70,.45)'],[mctx,'#fff']]){
    c.strokeStyle=col; c.lineWidth=w; c.lineCap='round'; c.lineJoin='round';
    c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.stroke();
  }
  hasMask=true;
}
draw.addEventListener('pointerdown',e=>{ if(!hasImage)return; drawing=true; last=pos(e);
  stroke(last,last); draw.setPointerCapture(e.pointerId); });
draw.addEventListener('pointermove',e=>{ if(!drawing)return; const p=pos(e); stroke(last,p); last=p; });
draw.addEventListener('pointerup',()=>drawing=false);
$('#clearMask').onclick=()=>{ if(!mask)return; dctx.clearRect(0,0,draw.width,draw.height);
  mctx.fillStyle='#000'; mctx.fillRect(0,0,mask.width,mask.height); hasMask=false; };

// ---- brush-size cursor preview (screen-space) ----
const cur=$('#cursor'); let lastE=null;
function showCur(e){ lastE=e; const s=+$('#brush').value;
  cur.style.width=cur.style.height=s+'px'; cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
  cur.style.display='block'; }
draw.addEventListener('pointermove',showCur);
draw.addEventListener('pointerenter',showCur);
draw.addEventListener('pointerleave',()=>cur.style.display='none');
$('#brush').addEventListener('input',()=>{ if(lastE && cur.style.display==='block') showCur(lastE); });

// ---- zoom (pinch) & pan (two-finger) ----
const wrap=$('#wrap'); let scale=1, tx=0, ty=0;
function applyT(){ wrap.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
function resetT(){ scale=1; tx=0; ty=0; applyT(); }
function zoomAt(cx,cy,f){
  const r=wrap.getBoundingClientRect(); const px=(cx-r.left)/r.width, py=(cy-r.top)/r.height;
  scale=Math.min(8,Math.max(0.15,scale*f)); applyT();
  const r2=wrap.getBoundingClientRect();
  tx+=cx-(r2.left+px*r2.width); ty+=cy-(r2.top+py*r2.height); applyT();
}
$('#stage').addEventListener('wheel',e=>{ if(!hasImage)return; e.preventDefault();
  if(e.ctrlKey||e.metaKey) zoomAt(e.clientX,e.clientY,Math.exp(-e.deltaY*0.01));
  else { tx-=e.deltaX; ty-=e.deltaY; applyT(); } },{passive:false});
$('#resetZoom').onclick=resetT;

// ---- run ----
async function run(){
  if(busy||!hasImage)return;
  const prompt=$('#prompt').value.trim();
  if(!prompt){ showErr('write a prompt'); $('#prompt').focus(); return; }
  setBusy(true, hasMask?'inpaint…':'edit…');
  try{
    const body={ image:view.toDataURL('image/png'), prompt };
    if(hasMask) body.mask=mask.toDataURL('image/png');
    const r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(j.error) throw new Error(j.error);
    loadImage(j.image);            // result becomes the new base (chain edits)
  }catch(e){ showErr(e.message); }
  finally{ setBusy(false); }
}
$('#run').onclick=run;
$('#prompt').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();run();} });

$('#download').onclick=()=>{ const a=document.createElement('a');
  a.href=view.toDataURL('image/png'); a.download='mflux-paint.png'; a.click(); };

// heartbeat: keep server alive only while this page is open
const ping=()=>fetch('/alive').catch(()=>{}); ping(); setInterval(ping, 4000);
</script>
</body>
</html>
